<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva Vida - Installation Guide Rosenherzen</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background:#fff
    .wrap { width:100%; height:100vh; display:flex; flex-direction:column; }

    .intro { display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%; height:100%; gap:2.5rem; background:#fff; }
    .logo-img { width:220px; height:220px; object-fit:contain; }
    .lang-row { display:flex; gap:1.2rem; flex-wrap:wrap; justify-content:center; padding:0 1rem; }
    .lang-btn {
      width:95px; height:95px; border:2px solid #d4a017; background:#fff;
      border-radius:14px; font-size:3.2rem; cursor:pointer;
      transition:all 0.2s; display:flex; align-items:center; justify-content:center;
      box-shadow:0 2px 8px rgba(212,160,23,0.2);
    }
    .lang-btn:hover { border-color:#b8860b; transform:scale(1.08); }
    .lang-btn:active { transform:scale(0.95); }

    .car-screen { display:none; flex-direction:column; width:100%; height:100%; background:#fff; position:relative; }
    .car-screen.active { display:flex; }

    /* Estilo IG Stories para la barra de progreso */
    .prog-bar { width:100%; height:4px; display:flex; gap:6px; padding:12px 12px 0 12px; flex-shrink:0; z-index:20; }
    .seg { flex:1; height:100%; background:rgba(212,160,23,0.25); border-radius:4px; overflow:hidden; }
    .fill { height:100%; width:0%; background:#d4a017; border-radius:4px; }
    
    /* Estados de la barra */
    .seg.done .fill { width:100%; }
    .seg.current .fill { animation: fillUp 8s linear forwards; }
    .is-paused .seg.current .fill { animation-play-state: paused; }
    
    @keyframes fillUp { from { width:0%; } to { width:100%; } }

    .car-content {
      flex:1; display:flex; align-items:flex-start; justify-content:center;
      padding:1rem 1.5rem; position:relative; overflow:hidden;
    }

    /* Zonas táctiles corregidas (25% / 75%) */
    .tap-l, .tap-r { position:absolute; top:0; height:100%; cursor:pointer; z-index:10; }
    .tap-l { left:0; width:25%; }
    .tap-r { right:0; width:75%; }

    .slide { display:none; text-align:center; width:100%; flex-direction:column; align-items:center; gap:0.85rem; padding-top:0.5rem; animation:fadeSlide 0.3s ease; }
    .slide.active { display:flex; }
    @keyframes fadeSlide { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    .step-num {
      font-size:8rem; font-weight:900; line-height:0.9;
      background:linear-gradient(135deg,#c8a415 0%,#f5d87a 45%,#a07810 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      font-family:Georgia,serif;
    }
    .divider { width:70px; height:3px; background:linear-gradient(90deg,#c8a415,#f0c93a,#c8a415); border-radius:2px; }
    .slide h2 { font-size:1.9rem; font-weight:800; color:#1a1a1a; line-height:1.2; }
    .slide p { font-size:1.35rem; line-height:1.6; color:#333; max-width:400px; }
    .warn { font-size:1.15rem; color:#b91c1c; font-weight:800; background:#fff1f1; border:2px solid #f5c6c6; padding:0.65rem 1.2rem; border-radius:10px; display:inline-block; margin-top:0.5rem; }

    .logo-small { position:absolute; top:15px; right:14px; width:56px; height:56px; object-fit:contain; opacity:0.75; z-index:5; pointer-events:none; }

    .final-title { font-size:2.4rem; font-weight:900; color:#1a1a1a; line-height:1.2; }
    .final-msg { font-size:1.3rem; font-weight:600; color:#1a1a1a; line-height:1.6; max-width:420px; margin-top:0.5rem; }
    .support-btn {
      padding:1rem 2.5rem; font-size:1.2rem;
      background:linear-gradient(135deg,#c8a415,#f0c93a,#a07810);
      color:#fff; border:none; border-radius:12px; cursor:pointer;
      font-weight:800; letter-spacing:0.03em;
      box-shadow:0 2px 12px rgba(180,130,0,0.4);
      text-decoration:none; display:inline-block; transition:all 0.2s;
      margin-top:1rem; position:relative; z-index:30;
    }
    .support-btn:hover { transform:scale(1.04); }
    .support-btn:active { transform:scale(0.97); }

    /* Ajustes para pantallas pequeñas (evitar que el botón quede hundido) */
    @media (max-height: 700px) {
      .step-num { font-size: 5.5rem; }
      .slide { gap: 0.5rem; padding-top: 0; }
      .final-title { font-size: 1.8rem; }
      .slide h2 { font-size: 1.6rem; }
      .slide p { font-size: 1.15rem; line-height: 1.4; }
      .warn { font-size: 1rem; padding: 0.5rem 1rem; margin-top: 0.2rem; }
      .support-btn { padding: 0.8rem 2rem; font-size: 1.1rem; margin-top: 0.5rem; }
      .logo-img { width: 180px; height: 180px; }
      .intro { gap: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="intro" id="introScreen">
    <img src="Logo_gold.png" class="logo-img" alt="Nueva Vida" onerror="this.style.display='none'">
    <div class="lang-row">
      <button class="lang-btn" onclick="go('de')">🇩🇪</button>
      <button class="lang-btn" onclick="go('en')">🇬🇧</button>
      <button class="lang-btn" onclick="go('fr')">🇫🇷</button>
      <button class="lang-btn" onclick="go('es')">🇪🇸</button>
      <button class="lang-btn" onclick="go('it')">🇮🇹</button>
    </div>
  </div>

  <div class="car-screen" id="carScreen">
    <div class="prog-bar" id="progBar">
      <!-- Generado dinámicamente por JS -->
    </div>
    <div class="car-content">
      <div class="tap-l" onclick="prev()"></div>
      <img src="Logo_gold.png" class="logo-small" alt="" onerror="this.style.display='none'">
      <div id="slides" style="width:100%"></div>
      <div class="tap-r" onclick="next()"></div>
    </div>
  </div>
</div>

<script>
const C={
  de:[
    {n:"1",t:"BASIS FÜR DIE LIEBE 🧼",b:"Reinige die Motorhaube mit Sorgfalt. Für perfekten Halt muss die Fläche absolut staub-, fett- und wachsfrei sein. (Nutze am besten Glasreiniger).",w:"❗ WICHTIG: KEIN WACHS ODER POLITUR!"},
    {n:"2",t:"HERZEN PLATZIEREN ❤️",b:"1. Lege die Herz-Schablonen auf.  \n2. Feuchte die Saugnäpfe minimal an.  \n3. Greife die Rose an der Basis und drücke sie fest.",w:"⚠️ NUR DIE BASIS DRÜCKEN, NIE DIE BLÜTE!"},
    {n:"3",t:"SICHERER HALT ✅",b:"Prüfe jede Rose mit einem sanften Zug. Zum spurlosen Abnehmen nach der Feier einfach den Rand des Saugnapfes anheben.",w:"❗ MAX. 80 KM/H – FÜR EURE SICHERHEIT"},
    {n:"4",t:"UNVERGESSLICH 🚗💕",b:"Fahrt sicher und genießt euren Tag.",w:"Nueva Vida – Momente, die bleiben.",f:1}
  ],
  en:[
    {n:"1",t:"BASE FOR LOVE 🧼",b:"Clean the hood with care. For perfect grip, the surface must be completely free of dust, grease, and wax. (Glass cleaner works best).",w:"❗ CRITICAL: NO WAX OR POLISH!"},
    {n:"2",t:"PLACING THE HEARTS ❤️",b:"1. Place the heart templates.  \n2. Slightly moisten the suction cups.  \n3. Grip the rose at the base and press firmly.",w:"⚠️ PRESS ONLY THE BASE, NEVER THE FLOWER!"},
    {n:"3",t:"SECURE HOLD ✅",b:"Test each rose with a gentle pull. To remove without a trace, simply lift the edge of the suction cup.",w:"❗ MAX. 80 KM/H (50 MPH) – SAFETY FIRST"},
    {n:"4",t:"UNFORGETTABLE 🚗💕",b:"Drive safely and enjoy your day.",w:"Nueva Vida – Moments that last forever.",f:1}
  ],
  fr:[
    {n:"1",t:"BASE POUR L'AMOUR 🧼",b:"Nettoyez le capot avec soin. Pour une adhérence parfaite, la surface doit être sans poussière, graisse ni cire. (Utilisez un nettoyant vitres).",w:"❗ ESSENTIEL : NI CIRE NI POLISH !"},
    {n:"2",t:"PLACER LES CŒURS ❤️",b:"1. Placez les gabarits.  \n2. Humidifiez légèrement les ventouses.  \n3. Saisissez la rose par la base et appuyez fermement.",w:"⚠️ APPUYEZ SUR LA BASE, JAMAIS SUR LA FLEUR !"},
    {n:"3",t:"MAINTIEN SÉCURISÉ ✅",b:"Testez chaque rose en tirant doucement. Pour retirer sans trace, soulevez simplement le bord de la ventouse.",w:"❗ MAX. 80 KM/H – LA SÉCURITÉ AVANT TOUT"},
    {n:"4",t:"INOUBLIABLE 🚗💕",b:"Conduisez prudemment et profitez.",w:"Nueva Vida – Les moments qui restent.",f:1}
  ],
  es:[
    {n:"1",t:"BASE PARA EL AMOR 🧼",b:"Limpia el capó con mimo. Para un agarre perfecto, la superficie debe estar libre de polvo, grasa y cera. (Usa limpiacristales).",w:"❗ VITAL: ¡CERO CERA O PULIMENTO!"},
    {n:"2",t:"COLOCAR LOS CORAZONES ❤️",b:"1. Sitúa las plantillas.  \n2. Humedece mínimamente las ventosas.  \n3. Agarra la rosa por la base y presiona con firmeza.",w:"⚠️ ¡PRESIONA SOLO LA BASE, NUNCA LA FLOR!"},
    {n:"3",t:"AGARRE SEGURO ✅",b:"Comprueba cada rosa con un suave tirón. Para retirarlas sin dejar rastro, simplemente levanta el borde de la ventosa.",w:"❗ MÁX. 80 KM/H – LA SEGURIDAD ES LO PRIMERO"},
    {n:"4",t:"INOLVIDABLE 🚗💕",b:"Conducid seguros y disfrutad.",w:"Nueva Vida – Momentos que perduran.",f:1}
  ],
  it:[
    {n:"1",t:"BASE PER L'AMORE 🧼",b:"Pulisci il cofano con cura. Per una presa perfetta, la superficie deve essere priva di polvere, grasso e cera. (Usa un lavavetri).",w:"❗ CRITICO: NIENTE CERA O LUCIDO!"},
    {n:"2",t:"POSIZIONARE I CUORI ❤️",b:"1. Posiziona i modelli.  \n2. Inumidisci leggermente le ventose.  \n3. Afferra la rosa alla base e premi saldamente.",w:"⚠️ PREMI SOLO LA BASE, MAI IL FIORE!"},
    {n:"3",t:"PRESA SICURA ✅",b:"Testa ogni rosa con una leggera trazione. Per rimuovere senza tracce, solleva semplicemente il bordo della ventosa.",w:"❗ MAX. 80 KM/H – LA SICUREZZA PRIMA DI TUTTO"},
    {n:"4",t:"INDIMENTICABILE 🚗💕",b:"Guidate con prudenza e godetevi la giornata.",w:"Nueva Vida – Momenti che rimangono.",f:1}
  ]
};
const ST={de:"Support kontaktieren",en:"Contact Support",fr:"Contacter le Support",es:"Contactar Soporte",it:"Contatta il Supporto"};
let lang="de",cur=0;

function go(l){
  lang=l; cur=0;
  document.getElementById("introScreen").style.display="none";
  document.getElementById("carScreen").classList.add("active");
  render(); show(0);
}

function render(){
  const c=document.getElementById("slides"); c.innerHTML="";
  const pb=document.getElementById("progBar"); pb.innerHTML="";
  
  C[lang].forEach((s,i)=>{
    // Crear segmento de barra de progreso
    const seg=document.createElement("div");
    seg.className="seg";
    const fill=document.createElement("div");
    fill.className="fill";
    
    // Sincronización: animationend solo para no-final slides
    if(i < C[lang].length - 1) {
      fill.addEventListener("animationend", () => {
        if(i === cur) next();
      }, { once: false });
    }
    
    seg.appendChild(fill);
    pb.appendChild(seg);

    // Crear diapositiva
    const d=document.createElement("div");
    d.className="slide";
    if(s.f){
      d.innerHTML=`
        <div class="step-num">${s.n}</div>
        <div class="divider"></div>
        <div class="final-title">${s.t}</div>
        ${s.b?`<div class="final-msg">${s.b}</div>`:""}
        ${s.w?`<div class="warn" style="margin-top:1rem; background:none; border:none; color:#d4a017;">${s.w}</div>`:""}
        <a href="mailto:info@nuevavida-ftv.de" class="support-btn">${ST[lang]}</a>
      `;
    } else {
      d.innerHTML=`
        <div class="step-num">${s.n}</div>
        <div class="divider"></div>
        <h2>${s.t}</h2>
        ${s.b?`<p>${s.b}</p>`:""}
        ${s.w?`<div class="warn">${s.w}</div>`:""}
      `;
    }
    c.appendChild(d);
  });
}

function show(i){
  document.querySelectorAll(".slide").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".seg").forEach((s,j)=>{
    s.classList.remove("current","done");
    if(j<i) s.classList.add("done"); 
    else if(j===i) {
      void s.offsetWidth; // Fuerza reflow para reiniciar animación
      s.classList.add("current");
    }
  });
  const slides = document.querySelectorAll(".slide");
  if(slides[i]) slides[i].classList.add("active");
}

function next(){ 
  if(cur < C[lang].length - 1){ 
    cur++; 
    show(cur); 
  } 
}

function prev(){ 
  if(cur > 0){ 
    cur--; 
    show(cur); 
  } 
}

// Lógica de Pausa al mantener pulsado (Touch y Mouse)
const carScreen = document.getElementById("carScreen");

carScreen.addEventListener("mousedown", () => carScreen.classList.add("is-paused"));
carScreen.addEventListener("mouseup", () => carScreen.classList.remove("is-paused"));
carScreen.addEventListener("mouseleave", () => carScreen.classList.remove("is-paused"));
carScreen.addEventListener("touchstart", () => carScreen.classList.add("is-paused"), { passive: true });
carScreen.addEventListener("touchend", () => carScreen.classList.remove("is-paused"), { passive: true });
carScreen.addEventListener("touchcancel", () => carScreen.classList.remove("is-paused"), { passive: true });

</script>
</body>
</html>
